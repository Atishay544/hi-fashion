name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'ecom-backend/**'
  pull_request:
    branches: [main]
    paths:
      - 'ecom-backend/**'

jobs:
  build:
    name: Build & Type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ecom-backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ecom-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run build
